services:
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["3001:3001"]
    env_file: .env
    depends_on: [postgres]

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    ports: ["4000:4000"]
    env_file: .env
    depends_on: [postgres, redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  workers:
    build: { context: ., dockerfile: apps/workers/Dockerfile }
    env_file: .env
    depends_on: [postgres, redis]

  postgres:
    image: postgres:16
    ports: ["5450:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    environment:
      POSTGRES_DB: cnet
      POSTGRES_USER: cnet
      POSTGRES_PASSWORD: cnet

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

volumes:
  pg_data:
    name: cnet_pg_data
  redis_data:
    name: cnet_redis_data
