# deploy/compose.data.yml — data services for the C-Net LXC.
# The app runs natively under systemd; only Postgres + Redis are containers.
# Reads POSTGRES_PASSWORD and REDIS_PASSWORD from the LXC's /opt/cnet/.env.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports: ["127.0.0.1:5432:5432"]   # app connects via localhost only
    volumes: ["pg_data:/var/lib/postgresql/data"]
    environment:
      POSTGRES_DB: cnet
      POSTGRES_USER: cnet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # An empty --requirepass disables auth outright rather than failing, so REDIS_PASSWORD
    # must be present: an unset var would otherwise leave Redis wide open.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    # Two explicit binds instead of 0.0.0.0: localhost for the LXC's own api/workers
    # (REDIS_URL points at 127.0.0.1), and the internal-network address so the
    # host-resident neural-bridge can publish. Nothing else is exposed.
    ports:
      - "127.0.0.1:6379:6379"
      - "${REDIS_BIND_IP:?REDIS_BIND_IP is required}:6379:6379"
    volumes: ["redis_data:/data"]

volumes:
  pg_data: { name: cnet_pg_data }
  redis_data: { name: cnet_redis_data }
